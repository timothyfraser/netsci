name: Sync NotebookLM Source to Drive

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'scripts/build_notebooklm_source.py'
      - 'scripts/upload_to_drive.py'
      - '.github/workflows/sync-notebooklm-source.yml'
  workflow_dispatch:

concurrency:
  group: sync-notebooklm-source
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --quiet \
            beautifulsoup4==4.12.3 \
            markdownify==0.13.1 \
            google-api-python-client==2.149.0 \
            google-auth==2.35.0

      - name: Build consolidated Markdown
        run: python scripts/build_notebooklm_source.py

      - name: Upload to Google Drive
        env:
          GDRIVE_SERVICE_ACCOUNT_JSON: ${{ secrets.GDRIVE_SERVICE_ACCOUNT_JSON }}
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
        run: python scripts/upload_to_drive.py
