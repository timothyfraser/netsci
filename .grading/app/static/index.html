<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Classbot Grading · SYSEN 5470</title>
  <link rel="stylesheet" href="/static/style.css?v=20260630d">
</head>
<body>
  <header class="topbar">
    <div class="brand">SYSEN 5470 · Classbot Grading</div>
    <div id="global-status" class="global-status hidden" aria-live="polite">
      <span class="spinner" aria-hidden="true"></span>
      <span id="global-status-text">Working…</span>
    </div>
    <div class="top-actions">
      <select id="filter-assignment">
        <option value="">All assignments</option>
      </select>
      <select id="filter-report">
        <option value="">All rows</option>
        <option value="yes">Has report text</option>
        <option value="no">Missing report text</option>
      </select>
      <select id="filter-status">
        <option value="">All statuses</option>
        <option value="synced">Synced</option>
        <option value="reviewed">Reviewed</option>
        <option value="published">Published</option>
      </select>
      <select id="model-select">
        <option value="claude-haiku-4-5">Haiku 4.5</option>
        <option value="claude-sonnet-4-6">Sonnet 4.6</option>
      </select>
      <button id="btn-sync" class="btn">Sync Canvas</button>
      <button id="btn-seed" class="btn ghost">Seed demo</button>
    </div>
  </header>

  <div class="layout">
    <aside class="queue-panel">
      <div class="panel-head">
        <h2>Queue</h2>
        <button id="btn-batch-classbot" class="btn small" type="button">Run Classbot (pending)</button>
      </div>
      <div id="batch-status" class="batch-status hidden" aria-live="polite" role="status">
        <span class="spinner" aria-hidden="true"></span>
        <span id="batch-status-text">Classbot running…</span>
      </div>
      <div id="queue-list" class="queue-list"></div>
    </aside>

    <main class="detail-panel" id="detail-panel">
      <p class="placeholder">Select a submission from the queue.</p>
    </main>
  </div>

  <div id="modal" class="modal hidden">
    <div class="modal-inner">
      <h3>Publish to Canvas</h3>
      <div id="modal-preview"></div>
      <div class="modal-actions">
        <button id="modal-cancel" class="btn ghost">Cancel</button>
        <button id="modal-confirm" class="btn">Confirm publish</button>
      </div>
    </div>
  </div>

  <script src="/static/app.js?v=20260630d"></script>
</body>
</html>
